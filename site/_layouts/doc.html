---
layout: default
---
<div class="docs-shell">
  <aside class="docs-sidebar" aria-label="Documentation"
         data-search-sidebar="docs" data-index="{{ '/assets/search/docs.json' | relative_url }}">
    <form class="sidebar-search" role="search" autocomplete="off" onsubmit="return false">
      <input type="search" name="q" placeholder="Search docs…" aria-label="Search docs" data-search-input>
    </form>
    <div class="search-results" data-search-results hidden></div>
    <nav class="tree-nav" data-tree>
      {% include doc-tree.html nodes=site.data.generated.docs_tree current=page.doc_path %}
    </nav>
  </aside>

  <article class="doc-article markdown-body">
    {% if page.folders and page.folders.size > 0 %}
      <p class="crumbs">{{ page.folders | join: " / " }}</p>
    {% endif %}
    <h1>{{ page.title }}</h1>
    {{ content }}
  </article>
</div>

<script src="{{ '/assets/js/vendor/minisearch.min.js' | relative_url }}"></script>
<script src="{{ '/assets/js/search.js' | relative_url }}" defer></script>
