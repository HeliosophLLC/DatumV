<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
{% assign page_title = page.title | default: site.title %}
<title>{% if page.title %}{{ page.title }} · {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
<meta name="description" content="{{ page.summary | default: page.description | default: site.description | strip_newlines | truncate: 200 }}">
<link rel="icon" href="{{ '/assets/img/emblem.png' | relative_url }}">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Hanken+Grotesk:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
<link rel="stylesheet" href="{{ '/assets/css/rouge.css' | relative_url }}">
