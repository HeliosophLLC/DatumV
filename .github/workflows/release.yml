name: Release

# Two ways in:
#   - release: published   → the canonical path. You draft a Release in
#     the GH UI (or via `gh release create vX.Y.Z`), and this workflow
#     builds installers for each matrix slot and attaches them as assets.
#   - workflow_dispatch    → manual button for iterating without cutting
#     a real Release. Installers are uploaded as run artifacts only.
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      build_target:
        description: 'Which installer variant to build'
        type: choice
        default: all
        options:
          - all
          - windows-standard
          - windows-cuda
          - linux-standard
          - linux-cuda

permissions:
  contents: write  # required to attach assets to the Release

concurrency:
  group: release-${{ github.event.release.tag_name || github.run_id }}
  cancel-in-progress: false

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  # Dynamic matrix construction. `matrix.<value>` is only accessible
  # inside step-level `if:` expressions in GitHub Actions — you cannot
  # filter a matrix at the job-level `if:`. So we compute the matrix
  # JSON in a separate setup job, then feed it to the installer job's
  # matrix via fromJson(). Skipped variants don't allocate runners.
  #
  # On `release: published` the input doesn't exist and TARGET defaults
  # to "all". On `workflow_dispatch` the input value is honoured.
  resolve-matrix:
    name: Resolve build matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - id: set
        shell: bash
        env:
          TARGET: ${{ github.event.inputs.build_target || 'all' }}
        run: |
          # Full matrix, expressed as JSON. Each entry's `attach_glob`
          # is a newline-separated string of upload paths — keep in
          # sync with `actions/upload-artifact@v4` + `softprops/action-gh-release@v2`
          # both of which accept multi-line glob input. Update manifests
          # are per-channel (`<channel>.yml` on Windows, `<channel>-linux.yml`
          # on Linux) because the npm dist scripts pass
          # `-c.publish.channel=<variant>` to electron-builder, which both
          # writes a per-channel yml and bakes the channel into the
          # installer's embedded app-update.yml. Keep `key` values in
          # sync with the workflow_dispatch input's `options:` block.
          ALL=$(cat <<'JSON'
          [
            {
              "os": "windows-latest",
              "label": "Windows standard",
              "key": "windows-standard",
              "script": "dist:win:standard",
              "artifact": "windows-standard-installer",
              "attach_glob": "src/Heliosoph.DatumV.Web/electron/out/*.exe\nsrc/Heliosoph.DatumV.Web/electron/out/*.zip\nsrc/Heliosoph.DatumV.Web/electron/out/*.blockmap\nsrc/Heliosoph.DatumV.Web/electron/out/standard.yml"
            },
            {
              "os": "ubuntu-latest",
              "label": "Linux standard",
              "key": "linux-standard",
              "script": "dist:linux:standard",
              "artifact": "linux-standard-appimage",
              "attach_glob": "src/Heliosoph.DatumV.Web/electron/out/*.AppImage\nsrc/Heliosoph.DatumV.Web/electron/out/*.blockmap\nsrc/Heliosoph.DatumV.Web/electron/out/standard-linux.yml"
            },
            {
              "os": "windows-latest",
              "label": "Windows CUDA",
              "key": "windows-cuda",
              "script": "dist:win:cuda",
              "artifact": "windows-cuda-installer",
              "attach_glob": "src/Heliosoph.DatumV.Web/electron/out/*.exe\nsrc/Heliosoph.DatumV.Web/electron/out/*.zip\nsrc/Heliosoph.DatumV.Web/electron/out/*.blockmap\nsrc/Heliosoph.DatumV.Web/electron/out/cuda.yml"
            },
            {
              "os": "ubuntu-latest",
              "label": "Linux CUDA",
              "key": "linux-cuda",
              "script": "dist:linux:cuda",
              "artifact": "linux-cuda-appimage",
              "attach_glob": "src/Heliosoph.DatumV.Web/electron/out/*.AppImage\nsrc/Heliosoph.DatumV.Web/electron/out/*.blockmap\nsrc/Heliosoph.DatumV.Web/electron/out/cuda-linux.yml"
            }
          ]
          JSON
          )

          if [[ "$TARGET" == "all" ]]; then
            MATRIX="$ALL"
          else
            MATRIX=$(echo "$ALL" | jq -c --arg k "$TARGET" '[.[] | select(.key == $k)]')
            # Fail loudly if the input doesn't match any known key. Without
            # this, fromJson() of an empty array silently produces zero
            # matrix slots and the installer job "succeeds" while doing
            # nothing — a confusing failure mode worth heading off.
            if [[ "$(echo "$MATRIX" | jq 'length')" == "0" ]]; then
              echo "::error::build_target='$TARGET' did not match any known variant. Valid options: all, windows-standard, windows-cuda, linux-standard, linux-cuda"
              exit 1
            fi
          fi

          echo "Computed matrix for target='$TARGET':"
          echo "$MATRIX" | jq .
          echo "matrix=$(echo "$MATRIX" | jq -c .)" >> "$GITHUB_OUTPUT"

  # Release gate: run the test suite on both Windows and Linux before any
  # installer is built. PR CI only runs ubuntu-latest, so this is the first
  # time Windows tests get exercised. Failing here cancels the installer
  # matrix entirely — better to abort a release than to ship binaries whose
  # tests don't pass on the target OS.
  #
  # GpuVariant=standard mirrors the PR CI command. We don't run the cuda
  # variant here: it pulls a ~500 MB NVIDIA payload that no CI runner can
  # actually exercise (no GPU), and the standard variant covers the
  # cross-platform code paths that matter for test correctness.
  release-gate-tests:
    name: Tests (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: '**/packages.lock.json'

      - name: Restore
        run: dotnet restore Heliosoph.DatumV.slnx -p:GpuVariant=standard -p:RestoreLockedMode=true

      - name: Build
        run: dotnet build Heliosoph.DatumV.slnx -c Release --no-restore -p:SkipClientApp=true -p:GpuVariant=standard

      # Sdcb.FFmpeg 7.0 dlopens libavutil.so.59 (FFmpeg 7 ABI). Ubuntu 24.04
      # ships FFmpeg 6.x (.so.58) and Sdcb publishes no Linux NuGet, so we
      # drop the BtbN/FFmpeg-Builds shared libs into /usr/local/lib for the
      # test runner. Windows test runs need no equivalent step:
      # Sdcb.FFmpeg.runtime.windows-x64 propagates through the test project's
      # ProjectReference and lands in bin/.../runtimes/win-x64/native/.
      - name: Install FFmpeg 7 shared libraries (Linux only)
        if: runner.os == 'Linux'
        run: |
          set -euxo pipefail
          curl -sSL -o /tmp/ffmpeg.tar.xz \
            https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-n7.1-latest-linux64-lgpl-shared-7.1.tar.xz
          mkdir -p /tmp/ffmpeg
          tar -xJf /tmp/ffmpeg.tar.xz -C /tmp/ffmpeg --strip-components=1
          sudo cp -P /tmp/ffmpeg/lib/lib*.so* /usr/local/lib/
          sudo ldconfig

      # OpenCvSharp's manylinux build dlopens libtiff.so.5 transitively, but
      # Ubuntu 24.04 dropped libtiff5 in favour of libtiff6. Pull the jammy
      # security-pocket .deb (maintained until 2027). Keep this URL aligned
      # with the one in stage-linux-natives.mjs and .github/workflows/ci.yml.
      - name: Install libtiff5 (Linux only)
        if: runner.os == 'Linux'
        run: |
          set -euxo pipefail
          curl -sSL -o /tmp/libtiff5.deb \
            http://security.ubuntu.com/ubuntu/pool/main/t/tiff/libtiff5_4.3.0-6ubuntu0.13_amd64.deb
          sudo dpkg -i /tmp/libtiff5.deb

      - name: Test
        run: dotnet test tests/Heliosoph.DatumV.Tests -c Release --no-build --no-restore

  installer:
    needs: [resolve-matrix, release-gate-tests]
    name: ${{ matrix.label }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.resolve-matrix.outputs.matrix) }}
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash  # uniform across windows + linux runners
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            src/Heliosoph.DatumV.Web/electron/package-lock.json
            src/Heliosoph.DatumV.Web/ClientApp/package-lock.json

      # `electron/dist:*` runs `npm --prefix ../ClientApp run build` before
      # the dotnet publish step, so ClientApp's node_modules must exist
      # ahead of time. The csproj's ClientAppInstall target would install
      # them too, but only during the dotnet build path — not before the
      # earlier Vite build.
      - name: Install ClientApp deps
        working-directory: src/Heliosoph.DatumV.Web/ClientApp
        run: npm ci

      - name: Install Electron deps
        working-directory: src/Heliosoph.DatumV.Web/electron
        run: npm ci

      # Stamp the installer with the Release tag so the output filename
      # matches the user-facing version (electron-builder reads version
      # from this package.json). On workflow_dispatch we append
      # -dev.<run-number> so manual runs are obviously not releases.
      - name: Resolve installer version
        id: version
        working-directory: src/Heliosoph.DatumV.Web/electron
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            TAG="${{ github.event.release.tag_name }}"
            VERSION="${TAG#v}"
            if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
              echo "::error::Tag '$TAG' does not produce a valid semver version: '$VERSION'"
              exit 1
            fi
          else
            BASE=$(node -p "require('./package.json').version")
            VERSION="${BASE}-dev.${{ github.run_number }}"
          fi
          echo "Resolved version: $VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Build installer
        working-directory: src/Heliosoph.DatumV.Web/electron
        run: npm run ${{ matrix.script }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          if-no-files-found: error
          path: ${{ matrix.attach_glob }}

      - name: Attach to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.attach_glob }}
          fail_on_unmatched_files: true
