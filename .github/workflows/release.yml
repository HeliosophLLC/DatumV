name: Release

# Two ways in:
#   - release: published   → the canonical path. You draft a Release in
#     the GH UI (or via `gh release create vX.Y.Z`), and this workflow
#     builds installers for each matrix slot and attaches them as assets.
#   - workflow_dispatch    → manual button for iterating without cutting
#     a real Release. Installers are uploaded as run artifacts only.
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      build_target:
        description: 'Which installer variant to build'
        type: choice
        default: all
        options:
          - all
          - windows-standard
          - windows-cuda
          - linux-standard
          - linux-cuda

permissions:
  contents: write  # required to attach assets to the Release

concurrency:
  group: release-${{ github.event.release.tag_name || github.run_id }}
  cancel-in-progress: false

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  installer:
    name: ${{ matrix.label }}
    # Build-target filtering: on `release: published`, every matrix slot
    # runs (build_target input doesn't exist for release events, so the
    # `inputs.build_target` reads as empty and the third clause kicks the
    # check over to "default to all"). On `workflow_dispatch`, only the
    # slot matching `matrix.key` runs (or all of them if the input is
    # 'all'). `matrix.key` is resolved per matrix instance, so this
    # short-circuits without spinning up a runner for skipped slots.
    if: github.event_name != 'workflow_dispatch' || inputs.build_target == 'all' || inputs.build_target == matrix.key
    strategy:
      fail-fast: false
      matrix:
        include:
          # `attach_glob` is the per-job file list for both upload-artifact
          # and the Release attach step. fail_on_unmatched_files requires
          # every pattern to match at least one file, so each matrix slot
          # carries only the extensions its electron-builder target emits
          # — Windows never produces .AppImage, Linux never produces .exe.
          #
          # `key` is the identifier the workflow_dispatch input matches
          # against to pick which slot(s) to run; must stay in sync with
          # the `options:` list at the top of the file.
          #
          # Update manifests are per-channel: the npm dist scripts pass
          # `-c.publish.channel=<variant>` to electron-builder, which both
          # writes a per-channel yml (e.g. `cuda.yml` instead of `latest.yml`)
          # and bakes the channel into the installer's embedded app-update.yml.
          # The installed app then reads only its variant's feed, so a CUDA
          # installer never auto-updates from the standard channel and vice
          # versa. Windows files: `<channel>.yml`. Linux: `<channel>-linux.yml`.
          # Standard variants ship the cross-vendor stack (DirectML on Windows,
          # Vulkan for LLamaSharp everywhere). Smaller installers; work on
          # NVIDIA, AMD, and Intel. ~70-95% of CUDA perf on NVIDIA.
          - os: windows-latest
            label: Windows standard
            key: windows-standard
            script: dist:win:standard
            artifact: windows-standard-installer
            attach_glob: |
              src/Heliosoph.DatumV.Web/electron/out/*.exe
              src/Heliosoph.DatumV.Web/electron/out/*.zip
              src/Heliosoph.DatumV.Web/electron/out/*.blockmap
              src/Heliosoph.DatumV.Web/electron/out/standard.yml
          - os: ubuntu-latest
            label: Linux standard
            key: linux-standard
            script: dist:linux:standard
            artifact: linux-standard-appimage
            attach_glob: |
              src/Heliosoph.DatumV.Web/electron/out/*.AppImage
              src/Heliosoph.DatumV.Web/electron/out/*.blockmap
              src/Heliosoph.DatumV.Web/electron/out/standard-linux.yml
          # CUDA variants bundle the NVIDIA-only stack
          # (Microsoft.ML.OnnxRuntime.Gpu + LLamaSharp.Backend.Cuda12.*). Peak
          # perf on NVIDIA; CPU fallback on non-NVIDIA hardware. ~750 MB larger.
          - os: windows-latest
            label: Windows CUDA
            key: windows-cuda
            script: dist:win:cuda
            artifact: windows-cuda-installer
            attach_glob: |
              src/Heliosoph.DatumV.Web/electron/out/*.exe
              src/Heliosoph.DatumV.Web/electron/out/*.zip
              src/Heliosoph.DatumV.Web/electron/out/*.blockmap
              src/Heliosoph.DatumV.Web/electron/out/cuda.yml
          - os: ubuntu-latest
            label: Linux CUDA
            key: linux-cuda
            script: dist:linux:cuda
            artifact: linux-cuda-appimage
            attach_glob: |
              src/Heliosoph.DatumV.Web/electron/out/*.AppImage
              src/Heliosoph.DatumV.Web/electron/out/*.blockmap
              src/Heliosoph.DatumV.Web/electron/out/cuda-linux.yml
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash  # uniform across windows + linux runners
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            src/Heliosoph.DatumV.Web/electron/package-lock.json
            src/Heliosoph.DatumV.Web/ClientApp/package-lock.json

      # `electron/dist:*` runs `npm --prefix ../ClientApp run build` before
      # the dotnet publish step, so ClientApp's node_modules must exist
      # ahead of time. The csproj's ClientAppInstall target would install
      # them too, but only during the dotnet build path — not before the
      # earlier Vite build.
      - name: Install ClientApp deps
        working-directory: src/Heliosoph.DatumV.Web/ClientApp
        run: npm ci

      - name: Install Electron deps
        working-directory: src/Heliosoph.DatumV.Web/electron
        run: npm ci

      # Stamp the installer with the Release tag so the output filename
      # matches the user-facing version (electron-builder reads version
      # from this package.json). On workflow_dispatch we append
      # -dev.<run-number> so manual runs are obviously not releases.
      - name: Resolve installer version
        id: version
        working-directory: src/Heliosoph.DatumV.Web/electron
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            TAG="${{ github.event.release.tag_name }}"
            VERSION="${TAG#v}"
            if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
              echo "::error::Tag '$TAG' does not produce a valid semver version: '$VERSION'"
              exit 1
            fi
          else
            BASE=$(node -p "require('./package.json').version")
            VERSION="${BASE}-dev.${{ github.run_number }}"
          fi
          echo "Resolved version: $VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Build installer
        working-directory: src/Heliosoph.DatumV.Web/electron
        run: npm run ${{ matrix.script }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          if-no-files-found: error
          path: ${{ matrix.attach_glob }}

      - name: Attach to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.attach_glob }}
          fail_on_unmatched_files: true
