name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - run: dotnet restore Heliosoph.DatumV.slnx

      - run: dotnet build Heliosoph.DatumV.slnx -c Release --no-restore

      - run: dotnet test tests/Heliosoph.DatumV.Tests -c Release --no-build --no-restore

  pack-and-publish-nuget:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-.+)?$ ]]; then
            echo "::error::Tag '$TAG' does not produce a valid semver version: '$VERSION'"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      - run: >
          dotnet pack src/Heliosoph.DatumV/Heliosoph.DatumV.csproj
          -c Release
          -o ./artifacts/nuget
          /p:Version=${{ steps.version.outputs.version }}

      - run: >
          dotnet nuget push ./artifacts/nuget/*.nupkg
          --api-key ${{ secrets.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json

      - uses: actions/upload-artifact@v4
        with:
          name: nuget
          path: ./artifacts/nuget/*.nupkg

  publish-cli:
    needs: build-and-test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        rid: [win-x64, linux-x64, linux-arm64, osx-arm64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Publish CLI (${{ matrix.rid }})
        run: >
          dotnet publish src/Heliosoph.DatumV.Cli/Heliosoph.DatumV.Cli.csproj
          -c Release
          -r ${{ matrix.rid }}
          -o ./artifacts/cli/${{ matrix.rid }}
          /p:Version=${{ steps.version.outputs.version }}
          /p:InformationalVersion=${{ steps.version.outputs.version }}

      - name: Archive (tar.gz)
        if: matrix.rid != 'win-x64'
        run: >
          tar -czf ./artifacts/datum-ingest-${{ matrix.rid }}.tar.gz
          -C ./artifacts/cli/${{ matrix.rid }} .

      - name: Archive (zip)
        if: matrix.rid == 'win-x64'
        run: >
          cd ./artifacts/cli/${{ matrix.rid }} &&
          zip -r ../../datum-ingest-${{ matrix.rid }}.zip .

      - uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.rid }}
          path: ./artifacts/datum-ingest-${{ matrix.rid }}.*

  attach-to-release:
    needs: publish-cli
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: cli-*
          merge-multiple: true
          path: ./release-assets

      - name: Upload assets to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release upload "${{ github.event.release.tag_name }}"
          ./release-assets/*
          --repo "${{ github.repository }}"
