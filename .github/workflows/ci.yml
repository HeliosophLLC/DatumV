name: CI

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          cache: true
          cache-dependency-path: '**/packages.lock.json'

      # GpuVariant=standard pulls the cross-vendor stack (DirectML +
      # Vulkan + CPU ORT) instead of the CUDA stack. CI runners have no
      # GPU, so CUDA would never actually run — defaulting to it would
      # just download ~500 MB of NVIDIA SASS binaries every CI run for
      # nothing. The standard variant also exercises the OnnxRuntime
      # CPU fallback path that's the lowest-common-denominator code.
      - run: dotnet restore Heliosoph.DatumV.slnx -p:GpuVariant=standard

      # SkipClientApp=true so the engine build does not require Node or
      # the Vite frontend to be installed. The release workflow is what
      # exercises the full Electron pipeline.
      - run: dotnet build Heliosoph.DatumV.slnx -c Release --no-restore -p:SkipClientApp=true -p:GpuVariant=standard

      - run: dotnet test tests/Heliosoph.DatumV.Tests -c Release --no-build --no-restore
