name: CI

on:
  pull_request:

permissions:
  contents: read

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - run: dotnet restore Heliosoph.DatumV.slnx

      - run: dotnet build Heliosoph.DatumV.slnx -c Release --no-restore

      - run: dotnet test tests/Heliosoph.DatumV.Tests -c Release --no-build --no-restore
