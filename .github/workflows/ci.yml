name: CI

on:
  pull_request:

# contents: write is required for the dependabot lock-file regen step below
# (force-evaluate + commit + push back to the PR branch). For human PRs no
# push happens; the locked-mode restore just verifies the existing lock files.
permissions:
  contents: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    # Run inside a jammy-based .NET SDK container so OpenCvSharp's manylinux
    # transitive deps (libtiff5, libopenexr25, libpng16-16, etc.) are
    # available via apt instead of needing per-package jammy .deb pins.
    # Ubuntu 22.04 is the baseline OpenCvSharp's manylinux build targets, so
    # the full image-codec stack is in jammy's default repos. The image
    # already includes the .NET 10 SDK + git + curl + xz-utils + dpkg, so
    # setup-dotnet isn't needed; the container's bundled SDK satisfies
    # global.json.
    container: mcr.microsoft.com/dotnet/sdk:10.0-jammy
    steps:
      - uses: actions/checkout@v4
        with:
          # Check out the PR head ref (not the synthetic merge ref) so the
          # dependabot lock-file regen step below can push back to the branch.
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      # OpenCvSharp's slim runtime dlopens this set transitively. Keep
      # --no-install-recommends to skip GUI / dev tooling weight. If a new
      # transitive dep surfaces in test output (DllNotFoundException for
      # something not listed), add it here, not as a separate .deb pin.
      - name: Install OpenCV runtime deps
        run: |
          set -euxo pipefail
          apt-get update
          apt-get install -y --no-install-recommends \
            libtbb2 libopenexr25 libtiff5 libpng16-16 libjpeg-turbo8 libwebp7

      # GpuVariant=standard is the default; passing it explicitly keeps
      # CI deterministic if the default ever changes. CI runners have no
      # GPU, so the CUDA variant would only download ~500 MB of NVIDIA
      # SASS binaries that never run. The standard variant also exercises
      # the OnnxRuntime CPU fallback path that's the lowest-common-
      # denominator code.
      #
      # Dependabot bumps Directory.Packages.props but does not regenerate
      # packages.lock.json, so locked-mode would fail every dependabot PR.
      # On dependabot PRs we --force-evaluate (regenerate) and push the
      # updated lock files back to the PR branch in the next step. On
      # human PRs we keep locked mode so dependency drift fails the build.
      - name: Restore
        run: |
          if [ "${{ github.actor }}" = "dependabot[bot]" ]; then
            dotnet restore Heliosoph.DatumV.slnx -p:GpuVariant=standard --force-evaluate
          else
            dotnet restore Heliosoph.DatumV.slnx -p:GpuVariant=standard -p:RestoreLockedMode=true
          fi

      - name: Commit regenerated lock files (dependabot only)
        if: github.actor == 'dependabot[bot]'
        run: |
          if git diff --quiet -- '**/packages.lock.json'; then
            echo "Lock files already in sync; nothing to commit."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add '**/packages.lock.json'
            git commit -m "Regenerate packages.lock.json for dependabot bump"
            git push
          fi

      # SkipClientApp=true so the engine build does not require Node or
      # the Vite frontend to be installed. The release workflow is what
      # exercises the full Electron pipeline.
      - run: dotnet build Heliosoph.DatumV.slnx -c Release --no-restore -p:SkipClientApp=true -p:GpuVariant=standard

      # Sdcb.FFmpeg 7.0 dlopens libavutil.so.59 (FFmpeg 7 ABI). Jammy ships
      # FFmpeg 4.4.x (.so.56) and Sdcb publishes no Linux native NuGet, so
      # we still need BtbN's shared build even inside the jammy container —
      # the OpenCV transitive deps benefit from jammy, but Sdcb's required
      # ABI is newer than anything jammy carries. The Windows side ships
      # natives via Sdcb.FFmpeg.runtime.windows-x64. Pinned to the n7.1
      # branch asset on the rolling `latest` tag so we track 7.1.x patches
      # without flipping ABI versions. Container runs as root, so no sudo.
      - name: Install FFmpeg 7 shared libraries
        run: |
          set -euxo pipefail
          curl -sSL -o /tmp/ffmpeg.tar.xz \
            https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-n7.1-latest-linux64-lgpl-shared-7.1.tar.xz
          mkdir -p /tmp/ffmpeg
          tar -xJf /tmp/ffmpeg.tar.xz -C /tmp/ffmpeg --strip-components=1
          cp -P /tmp/ffmpeg/lib/lib*.so* /usr/local/lib/
          ldconfig

      - run: dotnet test tests/Heliosoph.DatumV.Tests -c Release --no-build --no-restore
