name: Prerelease

on:
  workflow_dispatch:
    inputs:
      version-suffix:
        description: 'Prerelease suffix (appended as -suffix.run_number)'
        required: false
        default: 'preview'

permissions:
  contents: read

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - run: dotnet restore Heliosoph.DatumV.slnx

      - run: dotnet build Heliosoph.DatumV.slnx -c Release --no-restore

      - run: dotnet test tests/Heliosoph.DatumV.Tests -c Release --no-build --no-restore

  pack-nuget:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Compute version
        id: version
        shell: bash
        run: |
          BASE=$(grep '<Version>' Directory.Build.props | sed 's/.*<Version>\(.*\)<\/Version>.*/\1/')
          VERSION="${BASE}-${{ inputs.version-suffix || 'preview' }}.${{ github.run_number }}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      - run: >
          dotnet pack src/Heliosoph.DatumV/Heliosoph.DatumV.csproj
          -c Release
          -o ./artifacts/nuget
          /p:Version=${{ steps.version.outputs.version }}

      - uses: actions/upload-artifact@v4
        with:
          name: nuget
          path: ./artifacts/nuget/*.nupkg
