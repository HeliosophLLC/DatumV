title: DatumIngest™
description: High-performance ML dataset query engine for .NET 10

url: "https://datumingest.heliosoph.com"
baseurl: ""

remote_theme: just-the-docs/just-the-docs@v0.10.0

color_scheme: datum

permalink: pretty

search_enabled: true
search.heading_level: 3

heading_anchors: true

nav_external_links:
  - title: GitHub
    url: https://github.com/heliosoph/DatumIngest
    opens_in_new_tab: true

aux_links:
  "DatumIngest on GitHub":
    - "https://github.com/heliosoph/DatumIngest"
aux_links_new_tab: true

gh_edit_link: true
gh_edit_link_text: "Edit this page on GitHub"
gh_edit_repository: "https://github.com/heliosoph/DatumIngest"
gh_edit_source: docs
gh_edit_view_mode: "edit"

footer_content: "&copy; 2026 Heliosoph LLC. DatumIngest&trade; is a trademark of Heliosoph LLC."

plugins:
  - jekyll-remote-theme

exclude:
  - scripts/
  - Gemfile
  - Gemfile.lock
  - README.md
  - "*.sh"
