<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- DatumIngest favicon: stylized "D" with constellation motif -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16162a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Constellation dots -->
  <circle cx="48" cy="12" r="1.5" fill="#8b5cf6" opacity="0.6"/>
  <circle cx="52" cy="24" r="1" fill="#b794f6" opacity="0.4"/>
  <circle cx="44" cy="18" r="1.2" fill="#8b5cf6" opacity="0.5"/>
  <line x1="48" y1="12" x2="44" y2="18" stroke="#8b5cf6" stroke-width="0.5" opacity="0.3"/>
  <line x1="44" y1="18" x2="52" y2="24" stroke="#8b5cf6" stroke-width="0.5" opacity="0.3"/>

  <!-- Letter "D" -->
  <text x="14" y="48" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="40" fill="url(#accent)">D</text>
</svg>
