appId: com.heliosoph.datumv
productName: DatumV
copyright: Copyright © 2026

directories:
  # build/ holds intermediate artifacts (dotnet publish output, etc).
  # out/ is the final installer destination, kept separate so the
  # build:clientapp / publish:dotnet scripts can clean their own
  # outputs without nuking the installer.
  output: out

# Files packed into the Electron app archive (app.asar). The .NET
# binary is NOT here — it goes through extraResources below so it
# stays unpacked on disk (executable bit preserved, easier to debug).
files:
  - dist/**
  - package.json
  - "node_modules/**/*"
  - "!node_modules/.bin"
  - "!**/*.{md,map,ts,tsbuildinfo}"
  - "!**/{tsconfig.json,electron-builder.yml,.gitignore}"

# Self-contained .NET publish output. Lives at
# `<app>/resources/backend/Heliosoph.DatumV.Web.exe` post-install, which is
# what main.ts looks for via `path.join(process.resourcesPath, 'backend',
# 'Heliosoph.DatumV.Web.exe')`.
extraResources:
  - from: build/backend
    to: backend
    filter:
      - "**/*"

win:
  target:
    # nsis: traditional Windows installer for users who want Start Menu
    #   integration, Add/Remove Programs, future file associations.
    # portable: self-extracting single .exe — runs anywhere, no install.
    #   Good for "try without committing" and locked-down machines.
    # zip: raw archive for users who want to extract and run by hand
    #   (USB stick, network share, custom install path).
    - target: nsis
      arch: [x64]
    - target: portable
      arch: [x64]
    - target: zip
      arch: [x64]
  # Default artifactName for win targets — overridden per-target below
  # so each filename clearly says which kind it is. DATUMV_VARIANT_SUFFIX
  # is set by the dist:win:* npm scripts ("" for standard, "-cuda" for CUDA).
  artifactName: ${productName}-${version}${env.DATUMV_VARIANT_SUFFIX}.${ext}

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  artifactName: ${productName}-${version}${env.DATUMV_VARIANT_SUFFIX}-setup.${ext}

portable:
  artifactName: ${productName}-${version}${env.DATUMV_VARIANT_SUFFIX}-portable.${ext}

mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  category: public.app-category.developer-tools
  artifactName: ${productName}-${version}.${ext}

linux:
  target:
    - target: AppImage
      arch:
        - x64
  category: Development
  artifactName: ${productName}-${version}${env.DATUMV_VARIANT_SUFFIX}.${ext}
