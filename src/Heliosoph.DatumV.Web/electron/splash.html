<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>DatumV</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: transparent;
    -webkit-user-select: none;
    user-select: none;
    -webkit-app-region: drag;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    color: #e6e7eb;
  }
  .card {
    box-sizing: border-box;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px;
    border-radius: 12px;
    background: linear-gradient(160deg, #1d2030 0%, #0f1117 100%);
    box-shadow: 0 24px 48px rgba(0, 0, 0, 0.45);
    border: 1px solid rgba(255, 255, 255, 0.06);
  }
  .title {
    font-size: 28px;
    font-weight: 600;
    letter-spacing: 0.5px;
    margin-bottom: 6px;
  }
  .subtitle {
    font-size: 12px;
    opacity: 0.6;
    margin-bottom: 28px;
  }
  .status {
    font-size: 12px;
    opacity: 0.75;
    min-height: 1.2em;
    text-align: center;
  }
  .bar {
    width: 60%;
    height: 2px;
    margin-top: 16px;
    border-radius: 2px;
    background: rgba(255, 255, 255, 0.08);
    overflow: hidden;
    position: relative;
  }
  .bar::after {
    content: '';
    position: absolute;
    left: -40%;
    top: 0;
    width: 40%;
    height: 100%;
    background: linear-gradient(90deg, transparent, #6b8aff, transparent);
    animation: slide 1.4s ease-in-out infinite;
  }
  @keyframes slide {
    0%   { left: -40%; }
    100% { left: 100%; }
  }
</style>
</head>
<body>
  <div class="card">
    <div class="title">DatumV</div>
    <div class="subtitle">Heliosoph</div>
    <div class="status" id="status">Starting…</div>
    <div class="bar"></div>
  </div>
  <script>
    // Optional progress channel. Main streams stage updates over the
    // 'splash:status' channel; we just paint the latest text. No IPC
    // wiring here means no preload needed for the splash window.
    const { ipcRenderer } = require('electron');
    ipcRenderer.on('splash:status', (_e, text) => {
      document.getElementById('status').textContent = text;
    });
  </script>
</body>
</html>
