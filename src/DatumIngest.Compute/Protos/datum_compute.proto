syntax = "proto3";

option csharp_namespace = "DatumIngest.Compute.Grpc";

package datum_compute;

// Compute backend service for DatumIngest query execution.
// Server-side streaming is used for query results; all other
// operations are unary RPCs.
service DatumCompute {
  // Creates a new session on the compute backend.
  rpc CreateSession (CreateSessionRequest) returns (CreateSessionResponse);

  // Destroys a session and starts a grace period before resources are freed.
  // The session remains accessible to reconnecting clients until the grace
  // period elapses. Pass the previous session_id as reconnect_session_id in
  // a subsequent CreateSession call to reclaim it.
  rpc DestroySession (DestroySessionRequest) returns (DestroySessionResponse);

  // Creates a query context within a session. Each context has its own
  // isolated temp table namespace, analogous to a separate SSMS tab.
  // Queries, explains, and schema lookups require a context_id.
  rpc CreateQueryContext (CreateQueryContextRequest) returns (CreateQueryContextResponse);

  // Destroys a query context, dropping all its temp tables and cleaning up
  // associated storage. Active queries on the context are cancelled first.
  rpc DestroyQueryContext (DestroyQueryContextRequest) returns (DestroyQueryContextResponse);

  // Lists all query contexts on a session.
  rpc ListQueryContexts (ListQueryContextsRequest) returns (ListQueryContextsResponse);

  // Executes one or more semicolon-separated SQL statements and streams
  // results back. DDL/DML statements produce a single StatementEffect each;
  // query statements produce a stream of QueryResultRow messages (the first
  // carries the schema). All results are tagged with the originating
  // statement's zero-based index. On failure the stream ends with a gRPC
  // error status and no further statements execute.
  rpc Query (QueryRequest) returns (stream QueryResult);

  // Returns the schema of a registered table. For temp tables, resolves
  // against the specified query context's overlay first.
  rpc GetSchema (GetSchemaRequest) returns (SchemaResponse);

  // Lists all registered tables visible to a query context: session-wide
  // base tables plus the context's own temp tables.
  rpc ListTables (ListTablesRequest) returns (ListResponse);

  // Lists all registered format providers.
  rpc ListProviders (ListProvidersRequest) returns (ListResponse);

  // Lists all available functions with argument metadata.
  rpc ListFunctions (ListFunctionsRequest) returns (ListFunctionsResponse);

  // Returns the execution plan for a SQL query.
  rpc Explain (ExplainRequest) returns (ExplainResponse);

  // Adds a data source to the session's catalog.
  rpc AddSource (AddSourceRequest) returns (AddSourceResponse);

  // Lists active sessions (admin only).
  rpc ListSessions (ListSessionsRequest) returns (ListSessionsResponse);

  // Cancels a running query on another session (admin only).
  rpc KillQuery (KillQueryRequest) returns (KillQueryResponse);

  // Cancels all active queries on a query context. The context_id identifies
  // the virtual connection whose work should be stopped.
  rpc CancelQuery (CancelQueryRequest) returns (CancelQueryResponse);

  // Returns accumulated usage metrics for a session.
  rpc GetUsage (GetUsageRequest) returns (GetUsageResponse);

  // Lists the currently executing queries on a session.
  rpc ListActiveQueries (ListActiveQueriesRequest) returns (ListActiveQueriesResponse);

  // Returns a unified manifest combining all registered tables.
  rpc GetStats (GetStatsRequest) returns (GetStatsResponse);
}

// ───────────────────── Session Management ─────────────────────

message CreateSessionRequest {
  // Authorization role: "user" or "admin".
  string role = 1;

  // Dataset identifier to load. Empty for local sessions.
  string dataset_id = 2;

  // Maximum query execution time in seconds.
  // 0 = use server default, positive = override, negative = disable.
  int32 query_timeout_seconds = 3;

  // Maximum number of rows returned by a single query.
  // 0 = use server default, positive = override, negative = disable.
  int64 max_output_rows = 4;

  // Throttle delay in milliseconds injected periodically during streaming.
  // 0 = use server default, positive = override, negative = disable.
  int32 throttle_delay_ms = 5;

  // Maximum Query Units a single query may accumulate.
  // 0 = use server default, positive = override, negative = disable.
  int64 max_query_units = 6;

  // Memory budget in bytes for spill-to-disk joins.
  // 0 = use server default, positive = override, negative = disable.
  int64 memory_budget_bytes = 7;

  // Maximum number of queries that may execute concurrently on this session.
  // 0 = use server default, positive = override, negative = disable.
  int32 max_concurrent_queries = 8;

  // Optional: session ID to reclaim after a transient disconnect. When set
  // and the session is still within its grace period, the server returns the
  // existing session instead of creating a new one.
  string reconnect_session_id = 9;
}

message CreateSessionResponse {
  // Unique session identifier for subsequent calls.
  string session_id = 1;

  // True when reconnect_session_id was provided and the existing session was
  // successfully reclaimed. False when a new session was created.
  bool reconnected = 2;
}

message DestroySessionRequest {
  string session_id = 1;
}

message DestroySessionResponse {
}

// ───────────────────── Query Contexts ─────────────────────

message CreateQueryContextRequest {
  string session_id = 1;

  // Human-readable label for debugging (e.g. "Tab 1", "SQL Assistant").
  string label = 2;
}

message CreateQueryContextResponse {
  // Unique context identifier scoped to the session.
  string context_id = 1;
}

message DestroyQueryContextRequest {
  string session_id = 1;
  string context_id = 2;
}

message DestroyQueryContextResponse {
}

message ListQueryContextsRequest {
  string session_id = 1;
}

message ListQueryContextsResponse {
  repeated QueryContextInfoMessage contexts = 1;
}

message QueryContextInfoMessage {
  string context_id = 1;
  string label = 2;
  string created_at = 3;

  // Number of temp tables currently held by this context.
  int32 temp_table_count = 4;
}

// ───────────────────── Query Execution ─────────────────────

message QueryRequest {
  string session_id = 1;
  string sql = 2;

  // Named parameter bindings ($name in SQL) mapped to typed values.
  map<string, DataValueMessage> parameters = 3;

  // Per-request row cap. Overrides the session-level max_output_rows for this
  // query only. 0 = use the session default, positive = override, negative = disable.
  int64 max_rows = 4;

  // Query context that owns temp tables for this execution.
  // Temp table creation and resolution are scoped to this context.
  string context_id = 5;
}

// Streamed result message. Each message is either a row from a query
// statement or an effect summary from a DDL/DML statement, tagged with
// the originating statement's index in the batch.
message QueryResult {
  // Zero-based index of the statement in the parsed batch that produced
  // this result. For single-statement SQL this is always 0.
  int32 statement_index = 1;

  // Running total of Query Units consumed across all statements so far.
  // The value on the last message is the definitive cost for the batch.
  int64 query_units = 2;

  // Server-assigned identifier for the entire batch execution.
  string query_id = 3;

  oneof result {
    // A row from a query (SELECT) statement.
    QueryResultRow row = 4;

    // Effect summary from a DDL/DML statement.
    StatementEffect effect = 5;
  }
}

// A single result row from a query statement.
message QueryResultRow {
  // Schema for this statement's result set. Set only on the first row
  // of each query statement in the batch.
  SchemaMessage schema = 1;

  // One value per column, in schema order.
  repeated DataValueMessage values = 2;
}

// Effect summary produced by a DDL/DML statement.
message StatementEffect {
  // Number of rows affected by the statement (0 for DDL).
  int64 affected_rows = 1;

  // Human-readable summary of the operation.
  string message = 2;
}

// ───────────────────── Schema & Catalog ─────────────────────

message GetSchemaRequest {
  string session_id = 1;
  string table_name = 2;

  // Query context for temp table resolution.
  string context_id = 3;
}

message SchemaResponse {
  repeated ColumnInfoMessage columns = 1;
}

message ListTablesRequest {
  string session_id = 1;

  // Query context whose temp tables are included in the listing
  // alongside session-wide base tables.
  string context_id = 2;
}

message ListProvidersRequest {
  string session_id = 1;
}

message ListFunctionsRequest {
  string session_id = 1;
}

message ListFunctionsResponse {
  repeated FunctionInfoMessage functions = 1;
}

message FunctionInfoMessage {
  // The SQL function name.
  string name = 1;

  // Ordered parameter list.
  repeated ParameterInfoMessage parameters = 2;

  // The return type name (e.g. "Scalar", "String"), empty if context-dependent.
  string return_type = 3;

  // Whether this is a table-valued function used in FROM/JOIN.
  bool is_table_valued = 4;

  // Base Query Unit cost per invocation. Image functions may incur additional
  // resolution-dependent costs at runtime (see Resource Governance docs).
  int32 query_unit_cost = 5;

  // Operational domain this function belongs to.
  FunctionCategoryValue category = 6;
}

message ParameterInfoMessage {
  // Parameter name (e.g. "value", "start").
  string name = 1;

  // Expected data kind for this parameter.
  ParameterKindValue kind = 2;

  // Whether this parameter is required.
  bool required = 3;
}

// Parameter type constraint. Mirrors DataKindValue where applicable,
// with an additional ANY variant for polymorphic parameters.
enum ParameterKindValue {
  PARAMETER_KIND_ANY = 0;
  PARAMETER_KIND_UINT8 = 1;
  PARAMETER_KIND_FLOAT32 = 2;
  PARAMETER_KIND_VECTOR = 3;
  PARAMETER_KIND_MATRIX = 4;
  PARAMETER_KIND_TENSOR = 5;
  PARAMETER_KIND_UINT8_ARRAY = 6;
  PARAMETER_KIND_IMAGE = 7;
  PARAMETER_KIND_STRING = 8;
  PARAMETER_KIND_DATE = 9;
  PARAMETER_KIND_DATE_TIME = 10;
  PARAMETER_KIND_JSON_VALUE = 11;
  PARAMETER_KIND_UUID = 12;
  PARAMETER_KIND_BOOLEAN = 13;
  PARAMETER_KIND_TIME = 14;
  PARAMETER_KIND_DURATION = 15;
  PARAMETER_KIND_ARRAY = 16;
  PARAMETER_KIND_INT8 = 17;
  PARAMETER_KIND_INT16 = 18;
  PARAMETER_KIND_UINT16 = 19;
  PARAMETER_KIND_INT32 = 20;
  PARAMETER_KIND_UINT32 = 21;
  PARAMETER_KIND_INT64 = 22;
  PARAMETER_KIND_UINT64 = 23;
  PARAMETER_KIND_FLOAT64 = 24;
}

// Classifies a function by its operational domain.
enum FunctionCategoryValue {
  FUNCTION_CATEGORY_STRING = 0;
  FUNCTION_CATEGORY_TEMPORAL = 1;
  FUNCTION_CATEGORY_NUMERIC = 2;
  FUNCTION_CATEGORY_ACTIVATION = 3;
  FUNCTION_CATEGORY_VECTOR = 4;
  FUNCTION_CATEGORY_IMAGE = 5;
  FUNCTION_CATEGORY_ENCODING = 6;
  FUNCTION_CATEGORY_JSON = 7;
  FUNCTION_CATEGORY_CONVERSION = 8;
  FUNCTION_CATEGORY_UTILITY = 9;
  FUNCTION_CATEGORY_TABLE = 10;
  FUNCTION_CATEGORY_AGGREGATE = 11;
  FUNCTION_CATEGORY_WINDOW = 12;
}

message ListResponse {
  repeated string items = 1;
}

// ───────────────────── Explain ─────────────────────

// Access method for data-access operators in an explain plan.
enum ExplainAccessMethod {
  EXPLAIN_ACCESS_METHOD_UNSPECIFIED = 0;
  EXPLAIN_ACCESS_METHOD_TABLE_SCAN = 1;
  EXPLAIN_ACCESS_METHOD_INDEX_SCAN = 2;
}

message ExplainRequest {
  string session_id = 1;
  string sql = 2;

  // When true, the plan is executed to collect runtime metrics
  // (row counts, timings). Equivalent to prefixing the SQL with "analyze ".
  bool analyze = 3;

  // Query context for temp table resolution in the plan.
  string context_id = 4;
}

message ExplainResponse {
  // Human-readable plan text (always populated for backward compatibility).
  string plan_text = 1;

  // Structured plan tree. Root node of the operator hierarchy.
  ExplainPlanNodeMessage root = 2;
}

// A single node in the execution plan tree.
message ExplainPlanNodeMessage {
  // Operator name (e.g. "Scan", "Filter", "INNER Join", "Sort").
  string operator_name = 1;

  // Operator-specific detail string (e.g. table name, predicate, columns).
  string details = 2;

  // Child operator nodes forming the plan subtree.
  repeated ExplainPlanNodeMessage children = 3;

  // Edge label from parent (e.g. "probe", "build" for hash joins).
  string child_label = 4;

  // Static plan warnings (e.g. "CROSS JOIN", "LIKE forces full scan").
  repeated string warnings = 5;

  // Static plan annotations (e.g. "bounded top-N sort (N=100)").
  repeated string annotations = 6;

  // Runtime metrics — populated only when analyze = true.
  ExplainRuntimeMetrics runtime = 7;

  // Estimated row count from cost model (0 if unknown).
  int64 estimated_rows = 8;

  // Whether the estimated_rows field was populated (distinguishes 0 from unknown).
  bool has_estimated_rows = 9;

  // Access method for data-access operators (Table Scan, Index Scan).
  // UNSPECIFIED for non-scan operators.
  ExplainAccessMethod access_method = 10;

  // Structured operator properties in key-value form.
  // Same data as `details` but available for programmatic consumption.
  map<string, string> properties = 11;
}

// Runtime execution metrics for a single plan node.
// Populated only by EXPLAIN ANALYZE.
message ExplainRuntimeMetrics {
  // Number of rows produced by this operator.
  int64 rows_produced = 1;

  // Number of rows consumed from child operators.
  int64 rows_consumed = 2;

  // Self time in microseconds (excludes children).
  int64 self_time_us = 3;

  // Total time in microseconds (includes children).
  int64 total_time_us = 4;

  // Runtime-only annotations (e.g. Parquet row group pruning stats).
  repeated string runtime_annotations = 5;
}

// ───────────────────── Source Management ─────────────────────

message AddSourceRequest {
  string session_id = 1;

  // Source definition: "provider:name=path[;key=value;...]".
  string source_definition = 2;
}

message AddSourceResponse {
  string message = 1;
}

// ───────────────────── Admin Operations ─────────────────────

message ListSessionsRequest {
  string session_id = 1;
}

message ListSessionsResponse {
  repeated SessionInfoMessage sessions = 1;
}

message KillQueryRequest {
  string session_id = 1;
  string target_session_id = 2;

  // Optional: cancel a specific query on the target session.
  // When empty, all active queries on the target session are cancelled.
  string query_id = 3;
}

message KillQueryResponse {
  string message = 1;
}

message CancelQueryRequest {
  string session_id = 1;

  // The query context whose active queries should be cancelled.
  string context_id = 2;
}

message CancelQueryResponse {
  string message = 1;
}

message GetUsageRequest {
  string session_id = 1;
}

message GetUsageResponse {
  string session_id = 1;
  int64 total_query_units = 2;
  int32 query_count = 3;

  // Number of queries currently executing on this session.
  int32 active_query_count = 4;
}

// ───────────────────── Shared Types ─────────────────────

message SchemaMessage {
  repeated ColumnInfoMessage columns = 1;
}

message ColumnInfoMessage {
  string name = 1;
  DataKindValue kind = 2;
  bool nullable = 3;

  // For Array columns: the element type. Unset (DATA_KIND_UINT8 = 0) for
  // non-array columns; use has_array_element_kind to distinguish.
  optional DataKindValue array_element_kind = 4;
}

// Mirrors DatumIngest.Model.DataKind enum values.
enum DataKindValue {
  DATA_KIND_UINT8 = 0;
  DATA_KIND_FLOAT32 = 1;
  DATA_KIND_VECTOR = 2;
  DATA_KIND_MATRIX = 3;
  DATA_KIND_TENSOR = 4;
  DATA_KIND_UINT8_ARRAY = 5;
  DATA_KIND_IMAGE = 6;
  DATA_KIND_STRING = 7;
  DATA_KIND_DATE = 8;
  DATA_KIND_DATE_TIME = 9;
  DATA_KIND_JSON_VALUE = 10;
  DATA_KIND_UUID = 11;
  DATA_KIND_BOOLEAN = 12;
  DATA_KIND_TIME = 13;
  DATA_KIND_DURATION = 14;
  DATA_KIND_ARRAY = 15;
  DATA_KIND_INT8 = 16;
  DATA_KIND_INT16 = 17;
  DATA_KIND_UINT16 = 18;
  DATA_KIND_INT32 = 19;
  DATA_KIND_UINT32 = 20;
  DATA_KIND_INT64 = 21;
  DATA_KIND_UINT64 = 22;
  DATA_KIND_FLOAT64 = 23;
}

// Discriminated value type transported over the wire.
// Exactly one field is set based on the column's DataKind.
message DataValueMessage {
  bool is_null = 1;

  oneof value {
    uint32 uint8_value = 2;
    float float32_value = 3;
    string string_value = 4;
    string date_value = 5;       // ISO 8601 date string
    string date_time_value = 6;  // ISO 8601 datetime string
    string json_value = 7;       // Raw JSON string
    bytes uint8_array_value = 8;
    bytes image_value = 9;
    VectorMessage vector_value = 10;
    MatrixMessage matrix_value = 11;
    TensorMessage tensor_value = 12;
    string uuid_value = 13;      // UUID string (RFC 9562)
    bool boolean_value = 14;
    string time_value = 15;      // HH:mm:ss.FFFFFFF time string
    double duration_value = 16;  // Total seconds as double
    ArrayMessage array_value = 17;  // Typed array with element kind + values
    int32 int8_value = 18;       // Signed 8-bit integer (widened to int32)
    int32 int16_value = 19;      // Signed 16-bit integer (widened to int32)
    uint32 uint16_value = 20;    // Unsigned 16-bit integer (widened to uint32)
    int32 int32_value = 21;
    uint32 uint32_value = 22;
    int64 int64_value = 23;
    uint64 uint64_value = 24;
    double float64_value = 25;
  }
}

// Typed array carrying element kind and individually-typed values.
message ArrayMessage {
  // Element type for all values in this array.
  DataKindValue element_kind = 1;

  // One entry per element, each set according to element_kind.
  repeated DataValueMessage elements = 2;
}

message VectorMessage {
  repeated float values = 1;
}

message MatrixMessage {
  int32 rows = 1;
  int32 columns = 2;
  repeated float values = 3;
}

message TensorMessage {
  repeated int32 shape = 1;
  repeated float values = 2;
}

// ───────────────────── Stats & Join Suggestions ─────────────────────

message GetStatsRequest {
  string session_id = 1;
}

message GetStatsResponse {
  // JSON-serialized SourceManifest containing all tables with available manifests.
  string manifest_json = 1;
}

message SessionInfoMessage {
  string session_id = 1;
  string role = 2;
  string dataset_id = 3;
  string created_at = 4;
  string last_activity_at = 5;
  int32 query_count = 6;
  int64 total_query_units = 7;
}

// ───────────────────── Active Queries ─────────────────────

message ListActiveQueriesRequest {
  string session_id = 1;
}

message ListActiveQueriesResponse {
  repeated ActiveQueryMessage queries = 1;
}

message ActiveQueryMessage {
  string query_id = 1;
  string sql = 2;
  string started_at = 3;

  // The query context this query is executing on.
  string context_id = 4;
}
